<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Research Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      min-height: 100vh;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      border-radius: 20px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #71717a;
      font-size: 1rem;
    }
    
    .input-section {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    textarea {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      color: #e4e4e7;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s;
    }
    
    textarea:focus {
      outline: none;
      border-color: #6366f1;
    }
    
    textarea::placeholder {
      color: #52525b;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .provider-group {
      display: flex;
      gap: 4px;
      background: #0a0a0f;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 3px;
    }

    .provider-group input {
      display: none;
    }

    .provider-group label {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: #71717a;
      transition: all 0.15s;
    }

    .provider-group input:checked + label {
      background: #6366f1;
      color: white;
    }

    .provider-group label:hover {
      color: #e4e4e7;
    }
    
    .iteration-select {
      background: #0a0a0f;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e4e4e7;
      font-family: inherit;
      font-size: 0.875rem;
      min-width: 150px;
    }

    .model-select {
      flex: 1;
      background: #0a0a0f;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e4e4e7;
      font-family: inherit;
      font-size: 0.875rem;
      min-width: 180px;
    }
    
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      color: white;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    
    .status-badge.running {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
    }
    
    .status-badge.complete {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }
    
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .results-section {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .results-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #f4f4f5;
    }
    
    .plan-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .plan-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #0a0a0f;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #a1a1aa;
    }
    
    .plan-number {
      width: 24px;
      height: 24px;
      background: #27272a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #71717a;
    }
    
    .research-data {
      background: #0a0a0f;
      border-radius: 12px;
      padding: 20px;
      line-height: 1.7;
      color: #d4d4d8;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #52525b;
    }
    
    .memory-section {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 24px;
    }
    
    .memory-header {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .memory-search {
      flex: 1;
      background: #0a0a0f;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e4e4e7;
      font-family: inherit;
    }
    
    .memory-search:focus {
      outline: none;
      border-color: #6366f1;
    }
    
    .memory-results {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .memory-item {
      padding: 12px 14px;
      background: #0a0a0f;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="./assets/Logo.png" alt="Nexus Logo" class="logo" />
      <h1>Nexus</h1>
      <p class="subtitle">Multi-Agent Research & Automation Engine</p>
    </header>
    
    <div class="input-section">
      <textarea id="taskInput" placeholder="What would you like to research? (e.g., 'Research the latest developments in AI agents')"></textarea>
      <div class="controls">
        <div class="provider-group">
          <input type="radio" id="providerOpenAI" name="provider" value="openai" checked onchange="onProviderChange()">
          <label for="providerOpenAI">OpenAI</label>
          <input type="radio" id="providerOpenRouter" name="provider" value="openrouter" onchange="onProviderChange()">
          <label for="providerOpenRouter">OpenRouter</label>
        </div>
        <select id="model" class="model-select">
          <option value="gpt-4o">GPT-4o</option>
        </select>
        <select id="iterations" class="iteration-select">
          <option value="1">1 iteration</option>
          <option value="2" selected>2 iterations</option>
          <option value="3">3 iterations</option>
          <option value="5">5 iterations</option>
        </select>
        <button id="runBtn" onclick="runResearch()">Run Research</button>
        <div id="statusBadge" class="status-badge" style="display: none;"></div>
      </div>
    </div>
    
    <div class="results-section" id="resultsSection" style="display: none;">
      <div class="results-header">
        <span class="results-title">Research Results</span>
        <span id="resultMeta" class="status-badge complete"></span>
      </div>
      <div id="planList" class="plan-list"></div>
      <div id="researchData" class="research-data"></div>
    </div>
    
    <div class="memory-section">
      <div class="memory-header">
        <input type="text" id="memorySearch" class="memory-search" placeholder="Search memory..." />
        <button onclick="searchMemory()">Search</button>
      </div>
      <div id="memoryResults" class="memory-results"></div>
    </div>
  </div>
  
  <script>
    const API_URL = window.__API_URL__ || 'http://localhost:8000';
    let isRunning = false;

    const OPENAI_MODELS = [
      'gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-4', 'gpt-3.5-turbo'
    ];

    let openrouterModels = [];

    async function loadModels() {
      try {
        const res = await fetch('https://openrouter.ai/api/v1/models');
        const data = await res.json();
        openrouterModels = (data.data || []).filter(m => {
          const p = m.pricing || {};
          return parseFloat(p.prompt) === 0 && parseFloat(p.completion) === 0;
        });
      } catch {
        openrouterModels = [];
      }
      populateModelDropdown('openai');
    }

    function populateModelDropdown(provider) {
      const select = document.getElementById('model');
      select.innerHTML = '';
      if (provider === 'openai') {
        OPENAI_MODELS.forEach(id => {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = id;
          if (id === 'gpt-4o') opt.selected = true;
          select.appendChild(opt);
        });
      } else {
        if (openrouterModels.length === 0) {
          const opt = document.createElement('option');
          opt.value = 'openrouter/free';
          opt.textContent = 'Free Models Router';
          select.appendChild(opt);
        } else {
          openrouterModels.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name || m.id;
            select.appendChild(opt);
          });
        }
      }
    }

    function onProviderChange() {
      const provider = document.querySelector('input[name="provider"]:checked').value;
      populateModelDropdown(provider);
    }

    async function runResearch() {
      if (isRunning) return;
      
      const task = document.getElementById('taskInput').value.trim();
      if (!task) return;
      
      const provider = document.querySelector('input[name="provider"]:checked').value;
      const model = document.getElementById('model').value;
      const maxIterations = parseInt(document.getElementById('iterations').value);
      const runBtn = document.getElementById('runBtn');
      const statusBadge = document.getElementById('statusBadge');
      
      isRunning = true;
      runBtn.disabled = true;
      statusBadge.style.display = 'inline-flex';
      statusBadge.className = 'status-badge running';
      statusBadge.innerHTML = '<div class="spinner"></div> Running...';
      
      try {
        const response = await fetch(`${API_URL}/research`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, max_iterations: maxIterations, model, provider })
        });
        
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || `Server error: ${response.status}`);
        }
        displayResults(data);
      } catch (error) {
        alert('Error: ' + error.message);
      } finally {
        isRunning = false;
        runBtn.disabled = false;
        statusBadge.innerHTML = 'Done';
        statusBadge.className = 'status-badge complete';
        setTimeout(() => { statusBadge.style.display = 'none'; }, 2000);
      }
    }
    
    function displayResults(data) {
      document.getElementById('resultsSection').style.display = 'block';
      
      const prov = data.provider || 'openai';
      const mod = data.model || 'gpt-4o';
      document.getElementById('resultMeta').textContent =
        `${data.iterations || 1} iter · ${prov}: ${mod}`;
      
      const planList = document.getElementById('planList');
      const plan = data.plan || [];
      planList.innerHTML = plan.length
        ? plan.map((step, i) => `
            <div class="plan-item">
              <span class="plan-number">${i + 1}</span>
              ${step}
            </div>
          `).join('')
        : '<div class="empty-state">No plan generated</div>';
      
      document.getElementById('researchData').textContent = data.research_data || 'No results';
    }
    
    loadModels();
    
    async function searchMemory() {
      const query = document.getElementById('memorySearch').value.trim();
      if (!query) return;
      
      try {
        const response = await fetch(`${API_URL}/memory/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        const results = document.getElementById('memoryResults');
        if (data.results && data.results.length > 0) {
          results.innerHTML = data.results.map(r => 
            `<div class="memory-item">${r}</div>`
          ).join('');
        } else {
          results.innerHTML = '<div class="empty-state">No results found</div>';
        }
      } catch (error) {
        console.error('Memory search error:', error);
      }
    }
    
    document.getElementById('taskInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) runResearch();
    });
  </script>
</body>
</html>
